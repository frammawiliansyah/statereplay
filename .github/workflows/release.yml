name: Release
on:
  push: { branches: [main] }

permissions:
  contents: write
  id-token: write # required for npm provenance (OIDC trusted publishing)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, registry-url: 'https://registry.npmjs.org' }
      - run: npm ci
      - uses: changesets/action@v1
        with:
          publish: npm run release # "release": build + changeset publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
